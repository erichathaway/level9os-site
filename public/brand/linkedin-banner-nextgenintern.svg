<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — NextGen Interns  (V3: no collage, mission-forward)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 264.
  Per user: drop the collage. Non-profit focused on "preparing the next
  generation for it all" — not an umbrella with sub-products like Level9OS.
  Treatment is clean: ambient blue/indigo wash + right-aligned headline that
  uses the user's exact framing.
  Headline: "Preparing the next gen." / "For all of it." (two-line)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 264" width="1584" height="264">
  <defs>
    <linearGradient id="ngAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="ngBlueBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngIndigoBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngEmeraldBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <filter id="ngBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <rect width="1584" height="264" fill="#030306"/>

  <!-- Ambient wash — full width, organic gradient feel matching mission tone -->
  <g filter="url(#ngBlur)">
    <circle cx="350"  cy="80"  r="340" fill="url(#ngBlueBlob)"/>
    <circle cx="900"  cy="220" r="320" fill="url(#ngIndigoBlob)"/>
    <circle cx="1300" cy="100" r="280" fill="url(#ngBlueBlob)"/>
    <circle cx="200"  cy="220" r="260" fill="url(#ngEmeraldBlob)"/>
  </g>

  <!-- ═══════════ HERO TEXT: two-line flowing sentence, right-aligned ═══════════ -->
  <text x="1500" y="120" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="rgba(255,255,255,0.98)">
    Preparing the next gen
  </text>

  <text x="1500" y="200" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="900" letter-spacing="-1.5" fill="url(#ngAccent)">
    to make real change.
  </text>
</svg>
