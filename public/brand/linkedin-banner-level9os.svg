<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — Level9OS  (V7: no 9, more faded, bigger text)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 264.
  Per user direction:
    - REMOVED Level9 "9" mark (this IS the Level9 page, no need to show it)
    - More faded (~18% opacity vs prior 28%)
    - Hero text 1.5× bigger (102px, was 68px)
    - Text right-aligned, clean stage (no logos behind it)
  Collage: 5 product chips, massively cropped at edges, zigzag layout left→right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 264" width="1584" height="264">
  <defs>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="obsidian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#14082E"/>
      <stop offset="100%" stop-color="#041521"/>
    </linearGradient>
    <linearGradient id="glassHi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stratosG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="cooG1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="cooG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="amberEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="cyanEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="blueEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="linkupObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1F1408"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </linearGradient>
    <linearGradient id="lucidObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1A2E"/>
      <stop offset="100%" stop-color="#020812"/>
    </linearGradient>
    <linearGradient id="commandObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06181B"/>
      <stop offset="100%" stop-color="#020809"/>
    </linearGradient>
    <linearGradient id="nextgenObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1429"/>
      <stop offset="100%" stop-color="#020610"/>
    </linearGradient>

    <radialGradient id="violetBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <clipPath id="bannerClip">
      <rect width="1584" height="264"/>
    </clipPath>
  </defs>

  <rect width="1584" height="264" fill="#030306"/>

  <g filter="url(#softBlur)">
    <circle cx="400"  cy="100" r="320" fill="url(#violetBlob)"/>
    <circle cx="700"  cy="220" r="280" fill="url(#cyanBlob)"/>
    <circle cx="1300" cy="130" r="280" fill="url(#violetBlob)"/>
  </g>

  <!-- ═══════════ COLLAGE — 5 product chips, NO Level9 9, very faded, zigzag ═══════════ -->
  <g clip-path="url(#bannerClip)" opacity="0.18">

    <!-- StratOS — far left, cropped left + bottom -->
    <g transform="translate(60, 200) rotate(-8)">
      <g transform="scale(1.30) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#obsidian)" stroke="url(#stratosG)" stroke-width="4"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <text x="160" y="162" text-anchor="middle" dominant-baseline="central"
              font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="180"
              fill="#FFFFFF" transform="rotate(-14 160 162)" style="letter-spacing:-0.04em">S</text>
      </g>
    </g>

    <!-- LucidORG — top, cropped top -->
    <g transform="translate(180, 40) rotate(6)">
      <g transform="scale(1.25) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#lucidObs)" stroke="url(#cyanEdge)" stroke-width="4"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <g transform="translate(160, 160) scale(7)">
          <circle cx="0" cy="-12" r="6" fill="#06B6D4"/>
          <circle cx="-12" cy="14" r="6" fill="#06B6D4"/>
          <circle cx="12" cy="14" r="6" fill="#06B6D4"/>
          <circle cx="0" cy="0" r="3.5" fill="#06B6D4" opacity="0.6"/>
          <line x1="0" y1="-9" x2="-12" y2="11" stroke="#06B6D4" stroke-width="2.4" opacity="0.7"/>
          <line x1="0" y1="-9" x2="12" y2="11"  stroke="#06B6D4" stroke-width="2.4" opacity="0.7"/>
          <line x1="-12" y1="14" x2="12" y2="14" stroke="#06B6D4" stroke-width="2.4" opacity="0.5"/>
          <line x1="0" y1="-9" x2="0" y2="-2"   stroke="#06B6D4" stroke-width="2.4" opacity="0.6"/>
        </g>
      </g>
    </g>

    <!-- CommandOS — middle, cropped bottom -->
    <g transform="translate(310, 220) rotate(-5)">
      <g transform="scale(1.30) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#commandObs)" stroke="url(#cyanEdge)" stroke-width="4"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <g transform="translate(160, 160) scale(7) translate(-16, -16)">
          <path d="M9 10l6 6-6 6" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <rect x="18" y="14" width="6" height="4" rx="1" fill="#06B6D4"/>
        </g>
      </g>
    </g>

    <!-- COO Playbook — top, cropped top -->
    <g transform="translate(440, 30) rotate(7)">
      <g transform="scale(1.25) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="#0A0E1A"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#cooG1)" opacity="0.18"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <g transform="translate(160, 160) scale(7) translate(-16, -16)">
          <rect x="7" y="8" width="18" height="3" rx="1.5" fill="url(#cooG2)" opacity="0.95"/>
          <rect x="7" y="13.5" width="14" height="3" rx="1.5" fill="url(#cooG2)" opacity="0.7"/>
          <rect x="7" y="19" width="18" height="3" rx="1.5" fill="url(#cooG2)" opacity="0.95"/>
          <rect x="7" y="24.5" width="11" height="3" rx="1.5" fill="url(#cooG2)" opacity="0.5"/>
          <circle cx="27" cy="15" r="2" fill="#EC4899"/>
        </g>
      </g>
    </g>

    <!-- LinkUpOS anchor — center, cropped bottom -->
    <g transform="translate(560, 220) rotate(-6)">
      <g transform="scale(1.25) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#linkupObs)" stroke="url(#amberEdge)" stroke-width="4"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <g transform="translate(160, 160) scale(8) translate(-12,-12) rotate(180 12 12)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 6v16"/>
          <path d="m19 13 2-1a9 9 0 0 1-18 0l2 1"/>
          <path d="M9 11h6"/>
          <circle cx="12" cy="4" r="2"/>
        </g>
      </g>
    </g>

    <!-- NextGen Interns target — top, cropped top -->
    <g transform="translate(680, 50) rotate(5)">
      <g transform="scale(1.20) translate(-160, -160)">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#nextgenObs)" stroke="url(#blueEdge)" stroke-width="4"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <g transform="translate(160, 160)">
          <circle cx="0" cy="0" r="60" fill="none" stroke="#3B82F6" stroke-width="6"/>
          <line x1="0" y1="-60" x2="0" y2="60" stroke="#3B82F6" stroke-width="5" opacity="0.5"/>
          <line x1="-60" y1="0" x2="60" y2="0" stroke="#3B82F6" stroke-width="5" opacity="0.5"/>
          <circle cx="0" cy="0" r="18" fill="#3B82F6"/>
        </g>
      </g>
    </g>

  </g>

  <!-- ═══════════ HERO TEXT: 1.5× bigger (102px), right-aligned, clean stage ═══════════ -->
  <text x="1500" y="170" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="102" font-weight="900" letter-spacing="-3" fill="rgba(255,255,255,0.98)">
    AI for operations.
  </text>
</svg>
