<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — LucidORG
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 396
  Brand: Org clarity, alignment, decision systems. Sky-blue, never pink.
         Serious, structural — reads as "the operating layer for org decisions."
  Palette:
    bg          #030306
    sky         #0EA5E9 (primary, anchor — per project memory)
    cyan        #06B6D4 (logo color, secondary)
    violet      #8B5CF6 (tertiary accent)
    headline    Inter Black 900, white/95
  Motif: connected nodes (3-node triangle from logo) scaled into a network
         lattice — implies coordination/alignment.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="loSkyBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="loVioletBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="loAccentText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="loGridFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="loGridMask">
      <rect width="1584" height="396" fill="url(#loGridFade)"/>
    </mask>
    <filter id="loBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <radialGradient id="loDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="#030306"/>

  <g filter="url(#loBlur)">
    <circle cx="1300" cy="120" r="380" fill="url(#loSkyBlob)"/>
    <circle cx="240" cy="300" r="320" fill="url(#loVioletBlob)"/>
  </g>

  <g mask="url(#loGridMask)" opacity="0.04">
    <g stroke="#0EA5E9" stroke-width="1">
      <line x1="64"   y1="0" x2="64"   y2="396"/>
      <line x1="128"  y1="0" x2="128"  y2="396"/>
      <line x1="192"  y1="0" x2="192"  y2="396"/>
      <line x1="256"  y1="0" x2="256"  y2="396"/>
      <line x1="320"  y1="0" x2="320"  y2="396"/>
      <line x1="384"  y1="0" x2="384"  y2="396"/>
      <line x1="448"  y1="0" x2="448"  y2="396"/>
      <line x1="512"  y1="0" x2="512"  y2="396"/>
      <line x1="576"  y1="0" x2="576"  y2="396"/>
      <line x1="640"  y1="0" x2="640"  y2="396"/>
      <line x1="704"  y1="0" x2="704"  y2="396"/>
      <line x1="768"  y1="0" x2="768"  y2="396"/>
      <line x1="832"  y1="0" x2="832"  y2="396"/>
      <line x1="896"  y1="0" x2="896"  y2="396"/>
      <line x1="960"  y1="0" x2="960"  y2="396"/>
      <line x1="1024" y1="0" x2="1024" y2="396"/>
      <line x1="1088" y1="0" x2="1088" y2="396"/>
      <line x1="1152" y1="0" x2="1152" y2="396"/>
      <line x1="1216" y1="0" x2="1216" y2="396"/>
      <line x1="1280" y1="0" x2="1280" y2="396"/>
      <line x1="1344" y1="0" x2="1344" y2="396"/>
      <line x1="1408" y1="0" x2="1408" y2="396"/>
      <line x1="1472" y1="0" x2="1472" y2="396"/>
      <line x1="1536" y1="0" x2="1536" y2="396"/>
      <line x1="0" y1="64"  x2="1584" y2="64"/>
      <line x1="0" y1="128" x2="1584" y2="128"/>
      <line x1="0" y1="192" x2="1584" y2="192"/>
      <line x1="0" y1="256" x2="1584" y2="256"/>
      <line x1="0" y1="320" x2="1584" y2="320"/>
    </g>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(120, 110)">
    <rect x="0" y="0" rx="16" ry="16" width="350" height="32" fill="rgba(255,255,255,0.02)" stroke="rgba(14,165,233,0.25)" stroke-width="1"/>
    <circle cx="18" cy="16" r="5" fill="url(#loDot)"/>
    <circle cx="18" cy="16" r="3" fill="#38BDF8"/>
    <text x="34" y="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.6)" font-weight="500">
      THE OPERATING LAYER FOR ORG DECISIONS
    </text>
  </g>

  <!-- Headline -->
  <text x="120" y="220" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="900" letter-spacing="-1.5" fill="rgba(255,255,255,0.95)">
    Strategy is fiction
  </text>
  <text x="120" y="280" font-family="Inter, -apple-system, sans-serif" font-size="44" font-weight="900" letter-spacing="-1" fill="url(#loAccentText)">
    until the org agrees on it.
  </text>

  <!-- Subline -->
  <text x="120" y="320" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.45)" letter-spacing="0.2">
    Alignment · Decision rights · RACI · Org design · Change without theater
  </text>

  <!-- Right: connected node lattice -->
  <g transform="translate(1300, 198)">
    <!-- Outer container -->
    <circle cx="0" cy="0" r="92" fill="rgba(14,165,233,0.04)" stroke="rgba(14,165,233,0.25)" stroke-width="1"/>

    <!-- 3-node triangle (scaled from lucidorg.svg) -->
    <!-- Connecting lines first (under nodes) -->
    <line x1="0" y1="-44" x2="-36" y2="22" stroke="rgba(14,165,233,0.6)" stroke-width="1.5"/>
    <line x1="0" y1="-44" x2="36" y2="22" stroke="rgba(14,165,233,0.6)" stroke-width="1.5"/>
    <line x1="-36" y1="22" x2="36" y2="22" stroke="rgba(14,165,233,0.4)" stroke-width="1.5"/>
    <!-- Spoke to center -->
    <line x1="0" y1="-44" x2="0" y2="-12" stroke="rgba(14,165,233,0.5)" stroke-width="1.2"/>
    <line x1="-36" y1="22" x2="0" y2="-12" stroke="rgba(14,165,233,0.5)" stroke-width="1.2"/>
    <line x1="36" y1="22" x2="0" y2="-12" stroke="rgba(14,165,233,0.5)" stroke-width="1.2"/>

    <!-- Nodes (3 main + 1 center) -->
    <circle cx="0" cy="-44" r="11" fill="#0EA5E9"/>
    <circle cx="-36" cy="22" r="11" fill="#0EA5E9"/>
    <circle cx="36" cy="22" r="11" fill="#0EA5E9"/>
    <circle cx="0" cy="-12" r="7" fill="#A78BFA" opacity="0.85"/>

    <!-- Wordmark -->
    <text x="0" y="125" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="800" letter-spacing="4" fill="rgba(255,255,255,0.85)">
      LUCIDORG
    </text>
    <text x="0" y="143" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="500" letter-spacing="2.5" fill="rgba(255,255,255,0.4)">
      CLARITY · ALIGNMENT · DECISION
    </text>
  </g>
</svg>
