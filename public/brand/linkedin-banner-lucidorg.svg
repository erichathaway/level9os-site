<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — LucidORG  (V2: recreated mark, faded)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 264.
  Per user: take the existing interlocking hexagonal logo and recreate in
  LucidORG brand colors (cyan / sky-blue / violet), faded in.
  Mark: 3 overlapping rhombi at 0°/60°/120° rotation form an interlocking
  hexagonal pattern matching the spirit of the existing olive-green mark.
  Massive scale, cropped at left edge, ~26% opacity.
  Headline (2-line flowing, matching NextGen treatment):
    Line 1 white: "Strategy is fiction"
    Line 2 gradient: "until the org agrees."
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 264" width="1584" height="264">
  <defs>
    <!-- LucidORG cool gradient: sky → violet → cyan -->
    <linearGradient id="loCool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0EA5E9"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Per-rhombus tints for the interlocking effect -->
    <linearGradient id="loRhomb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="loRhomb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="loRhomb3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Headline accent -->
    <linearGradient id="loAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <radialGradient id="loSkyBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="loVioletBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="loCyanBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="loBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>

    <clipPath id="bannerClip">
      <rect width="1584" height="264"/>
    </clipPath>
  </defs>

  <rect width="1584" height="264" fill="#030306"/>

  <g filter="url(#loBlur)">
    <circle cx="350"  cy="80"  r="340" fill="url(#loSkyBlob)"/>
    <circle cx="900"  cy="220" r="320" fill="url(#loVioletBlob)"/>
    <circle cx="1300" cy="100" r="280" fill="url(#loCyanBlob)"/>
  </g>

  <!-- Mark removed per user — banner is text-only with ambient wash. -->
  <!-- Standalone square logo lives in /brand/logo-lucidorg.svg -->


  <!-- ═══════════ HERO TEXT: 2-line flowing, right-aligned (matches NextGen) ═══════════ -->
  <text x="1500" y="120" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="rgba(255,255,255,0.98)">
    Strategy is fiction
  </text>

  <text x="1500" y="200" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="900" letter-spacing="-1.5" fill="url(#loAccent)">
    until the org agrees.
  </text>
</svg>
