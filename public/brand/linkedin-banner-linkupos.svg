<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — LinkUpOS
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 396
  Brand source: live linkupos.com hero (verified 2026-04-16) + actual logo
                from /linkupos-site/public/favicon.svg (upside-down anchor).

  Headline (verbatim live):
    "You don't need to post more."
    "You need to matter more."
  Sub: "We turn your expertise into signal people can't ignore."
  Footer: "Voice-calibrated AI · Quality-gated content · Full LinkedIn automation"

  Visual: amber target/crosshair (the "signal" motif user explicitly approved)
          with the actual upside-down anchor at center (the real LinkUpOS mark).

  Palette:
    bg          #030306
    amber       #F59E0B  (primary, matches favicon + dashboard badge)
    cyan-bridge #06B6D4  (subtle Level9 family link, since LinkUpOS is owned
                           and operated by Level9OS LLC per the live footer)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="luAmberBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="luCyanBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="luAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="luGridFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="luGridMask">
      <rect width="1584" height="396" fill="url(#luGridFade)"/>
    </mask>
    <filter id="luBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <radialGradient id="luDot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="#030306"/>

  <g filter="url(#luBlur)">
    <circle cx="1300" cy="160" r="380" fill="url(#luAmberBlob)"/>
    <circle cx="240" cy="280" r="320" fill="url(#luCyanBlob)"/>
  </g>

  <g mask="url(#luGridMask)" opacity="0.04">
    <g stroke="#F59E0B" stroke-width="1">
      <line x1="64"   y1="0" x2="64"   y2="396"/>
      <line x1="128"  y1="0" x2="128"  y2="396"/>
      <line x1="192"  y1="0" x2="192"  y2="396"/>
      <line x1="256"  y1="0" x2="256"  y2="396"/>
      <line x1="320"  y1="0" x2="320"  y2="396"/>
      <line x1="384"  y1="0" x2="384"  y2="396"/>
      <line x1="448"  y1="0" x2="448"  y2="396"/>
      <line x1="512"  y1="0" x2="512"  y2="396"/>
      <line x1="576"  y1="0" x2="576"  y2="396"/>
      <line x1="640"  y1="0" x2="640"  y2="396"/>
      <line x1="704"  y1="0" x2="704"  y2="396"/>
      <line x1="768"  y1="0" x2="768"  y2="396"/>
      <line x1="832"  y1="0" x2="832"  y2="396"/>
      <line x1="896"  y1="0" x2="896"  y2="396"/>
      <line x1="960"  y1="0" x2="960"  y2="396"/>
      <line x1="1024" y1="0" x2="1024" y2="396"/>
      <line x1="1088" y1="0" x2="1088" y2="396"/>
      <line x1="1152" y1="0" x2="1152" y2="396"/>
      <line x1="1216" y1="0" x2="1216" y2="396"/>
      <line x1="1280" y1="0" x2="1280" y2="396"/>
      <line x1="1344" y1="0" x2="1344" y2="396"/>
      <line x1="1408" y1="0" x2="1408" y2="396"/>
      <line x1="1472" y1="0" x2="1472" y2="396"/>
      <line x1="1536" y1="0" x2="1536" y2="396"/>
      <line x1="0" y1="64"  x2="1584" y2="64"/>
      <line x1="0" y1="128" x2="1584" y2="128"/>
      <line x1="0" y1="192" x2="1584" y2="192"/>
      <line x1="0" y1="256" x2="1584" y2="256"/>
      <line x1="0" y1="320" x2="1584" y2="320"/>
    </g>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" rx="16" ry="16" width="320" height="32" fill="rgba(255,255,255,0.02)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
    <circle cx="18" cy="16" r="5" fill="url(#luDot)"/>
    <circle cx="18" cy="16" r="3" fill="#FBBF24"/>
    <text x="34" y="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.6)" font-weight="500">
      THE SIGNAL ENGINE FOR LINKEDIN
    </text>
  </g>

  <!-- Headline (verbatim from live linkupos.com hero) -->
  <text x="120" y="200" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" fill="rgba(255,255,255,0.95)">
    You don&apos;t need to post more.
  </text>
  <text x="120" y="262" font-family="Inter, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" fill="url(#luAccent)">
    You need to matter more.
  </text>

  <!-- Subline (verbatim) -->
  <text x="120" y="305" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="0.1">
    We turn your expertise into signal people can&apos;t ignore.
  </text>

  <!-- Footer differentiator -->
  <text x="120" y="345" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="0.3">
    Voice-calibrated AI · Quality-gated content · Full LinkedIn automation
  </text>

  <!-- ═══════════ RIGHT: ORANGE TARGET (restored) + actual upside-down anchor ═══════════ -->
  <g transform="translate(1300, 198)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="92" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>

    <!-- Target rings -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>

    <!-- Crosshair -->
    <line x1="0" y1="-78" x2="0" y2="-30" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="30"  x2="0" y2="78"  stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="-78" y1="0" x2="-30" y2="0" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="30" y1="0"  x2="78" y2="0"  stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>

    <!-- Center: actual LinkUpOS logo (upside-down anchor from /linkupos-site/public/favicon.svg) -->
    <!-- Source: 24-unit Lucide anchor, rotated 180°. Scaled here to fit inside 40-unit inner ring. -->
    <g transform="scale(1.6) translate(-12,-12) rotate(180 12 12)" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 6v16"/>
      <path d="m19 13 2-1a9 9 0 0 1-18 0l2 1"/>
      <path d="M9 11h6"/>
      <circle cx="12" cy="4" r="2"/>
    </g>

    <!-- Wordmark below the target -->
    <text x="0" y="125" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="800" letter-spacing="3" fill="rgba(255,255,255,0.85)">
      LINKUPOS
    </text>
  </g>
</svg>
