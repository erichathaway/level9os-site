<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn Company Page Banner — LinkUpOS  (V3: bigger text, less chrome)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 1584 × 264 (6:1 — matches LinkedIn display).
  Layout (revised per actual live page screenshot):
    - Logo overlay zone: left ~25% (x=0 to ~440) — circular page logo
      sits here. Keep clean ambient only.
    - Content zone: x=480 to ~1540 (1060px wide).
    - Hero text fills the content area. NO chip mark — page logo IS the
      brand mark; a chip in the banner duplicates it.
    - One subtle URL line at bottom right.
  Brand: amber-anchored. Verbatim live linkupos.com hero.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 264" width="1584" height="264">
  <defs>
    <radialGradient id="luAmberBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="luCyanBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="luAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="luBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <rect width="1584" height="264" fill="#030306"/>

  <g filter="url(#luBlur)">
    <circle cx="1300" cy="60"  r="320" fill="url(#luAmberBlob)"/>
    <circle cx="1500" cy="220" r="240" fill="url(#luCyanBlob)"/>
    <circle cx="200"  cy="130" r="220" fill="url(#luAmberBlob)"/>
  </g>

  <!-- Hero — right-aligned, pushed to right 25% of banner -->
  <text x="1520" y="120" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="900" letter-spacing="-2" fill="rgba(255,255,255,0.98)">
    Don&apos;t post more.
  </text>

  <text x="1520" y="195" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="900" letter-spacing="-2" fill="url(#luAccent)">
    Matter more.
  </text>
</svg>
