<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Level9 — Logo Package</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#030306;color:#fff;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:720px;margin:0 auto}
  .ttl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;text-align:center;padding:4px 0}

  /* HERO — primary on dark + cream, side-by-side even on narrow */
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tile{aspect-ratio:1/1;border-radius:14px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08)}
  .tile.dark{background:#000}
  .tile.cream{background:#FAF8F5}
  .tile::before{content:"";position:absolute;inset:0;background:
    radial-gradient(circle at 30% 20%, rgba(139,92,246,.12), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.08), transparent 45%);pointer-events:none}
  .tile.cream::before{display:none}
  .tile::after{content:"";position:absolute;inset:0;
    background:linear-gradient(transparent 95%, rgba(255,255,255,.04) 95%),linear-gradient(90deg, transparent 95%, rgba(255,255,255,.04) 95%);
    background-size:16px 16px;pointer-events:none;
    mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%)}
  .tile.cream::after{background:linear-gradient(transparent 95%, rgba(0,0,0,.05) 95%),linear-gradient(90deg, transparent 95%, rgba(0,0,0,.05) 95%);background-size:16px 16px}
  .tile svg{position:relative;z-index:2;width:70%;height:70%}
  .lbl{position:absolute;bottom:6px;left:8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.15em;color:rgba(255,255,255,.4);z-index:3}
  .tile.cream .lbl{color:rgba(0,0,0,.4)}

  /* SIZE LADDER */
  .ladder{background:#0a0a14;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 12px;display:flex;align-items:flex-end;justify-content:space-around;gap:6px;flex-wrap:nowrap}
  .sb{display:flex;flex-direction:column;align-items:center;gap:4px}
  .sb .cap{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;color:rgba(255,255,255,.35)}

  /* LOCKUP */
  .lockup{background:#0a0a14;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}
  .lockup svg{max-width:100%;height:auto}
</style>
</head>
<body>
<div class="wrap">

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#8B5CF6"/>
        <stop offset="55%" stop-color="#06B6D4"/>
        <stop offset="100%" stop-color="#0d9488"/>
      </linearGradient>
      <linearGradient id="obsidian" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#14082e"/>
        <stop offset="100%" stop-color="#041521"/>
      </linearGradient>
      <linearGradient id="glassHi" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"  stop-color="rgba(255,255,255,.14)"/>
        <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <!-- Reusable mark symbol -->
      <symbol id="mark" viewBox="0 0 320 320">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#obsidian)" stroke="url(#cool)" stroke-width="1.5"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <text x="160" y="162" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui" font-weight="900" font-size="180" fill="#fff" transform="rotate(-14 160 162)" style="letter-spacing:-0.04em">9</text>
      </symbol>
      <symbol id="mark-thick" viewBox="0 0 320 320">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#obsidian)" stroke="url(#cool)" stroke-width="6"/>
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#glassHi)"/>
        <text x="160" y="162" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui" font-weight="900" font-size="180" fill="#fff" transform="rotate(-14 160 162)" style="letter-spacing:-0.04em">9</text>
      </symbol>
      <symbol id="mark-favicon" viewBox="0 0 320 320">
        <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#obsidian)" stroke="url(#cool)" stroke-width="10"/>
        <text x="160" y="162" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui" font-weight="900" font-size="180" fill="#fff" transform="rotate(-14 160 162)" style="letter-spacing:-0.04em">9</text>
      </symbol>
      <symbol id="mark-square" viewBox="0 0 320 320">
        <rect x="0" y="0" width="320" height="320" fill="url(#obsidian)"/>
        <rect x="0" y="0" width="320" height="320" fill="url(#glassHi)"/>
        <rect x="4" y="4" width="312" height="312" fill="none" stroke="url(#cool)" stroke-width="4"/>
        <text x="160" y="162" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui" font-weight="900" font-size="200" fill="#fff" transform="rotate(-14 160 162)" style="letter-spacing:-0.04em">9</text>
      </symbol>
    </defs>
  </svg>

  <div class="ttl">Level9 · Logo Package</div>

  <!-- HERO: rounded primary -->
  <div class="hero">
    <div class="tile dark"><svg><use href="#mark"/></svg><div class="lbl">ROUNDED · DARK</div></div>
    <div class="tile cream"><svg><use href="#mark"/></svg><div class="lbl">ROUNDED · CREAM</div></div>
  </div>

  <!-- SQUARE variant -->
  <div class="hero">
    <div class="tile dark" style="padding:0"><svg style="width:100%;height:100%"><use href="#mark-square"/></svg><div class="lbl">SQUARE · DARK</div></div>
    <div class="tile cream" style="padding:0"><svg style="width:100%;height:100%"><use href="#mark-square"/></svg><div class="lbl">SQUARE · CREAM</div></div>
  </div>

  <div class="ttl">Size Ladder</div>

  <!-- LADDER -->
  <div class="ladder">
    <div class="sb">
      <svg width="72" height="72"><use href="#mark"/></svg>
      <div class="cap">72</div>
    </div>
    <div class="sb">
      <svg width="48" height="48"><use href="#mark-thick"/></svg>
      <div class="cap">48</div>
    </div>
    <div class="sb">
      <svg width="32" height="32"><use href="#mark-thick"/></svg>
      <div class="cap">32 NAV</div>
    </div>
    <div class="sb">
      <svg width="24" height="24"><use href="#mark-thick"/></svg>
      <div class="cap">24</div>
    </div>
    <div class="sb">
      <svg width="16" height="16"><use href="#mark-favicon"/></svg>
      <div class="cap">16 FAV</div>
    </div>
  </div>

  <div class="ttl">Horizontal Lockup</div>

  <!-- LOCKUP -->
  <div class="lockup">
    <svg viewBox="0 0 560 160" width="100%">
      <rect x="20" y="20" width="120" height="120" rx="28" fill="url(#obsidian)" stroke="url(#cool)" stroke-width="1.2"/>
      <rect x="20" y="20" width="120" height="120" rx="28" fill="url(#glassHi)"/>
      <text x="80" y="82" text-anchor="middle" dominant-baseline="central" font-family="Inter,system-ui" font-weight="900" font-size="92" fill="#fff" transform="rotate(-14 80 82)" style="letter-spacing:-0.04em">9</text>
      <text x="168" y="82" font-family="Inter,system-ui" font-weight="900" font-size="48" fill="#fff" dominant-baseline="central" style="letter-spacing:-0.02em">Level9<tspan fill="rgba(255,255,255,.35)">OS</tspan></text>
      <text x="170" y="118" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,.45)" letter-spacing="3">AI FOR OPERATIONS</text>
      <line x1="170" y1="130" x2="340" y2="130" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    </svg>
  </div>

  <div class="ttl">Obsidian · Cool Gradient Edge · Inter 900</div>

</div>
</body>
</html>
